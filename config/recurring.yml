# SolidQueue recurring jobs.
# Runs only in production (development/test use their own triggering).

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  purge_sso_assertion_denylist:
    class: PurgeSsoAssertionDenylistJob
    queue: background
    schedule: every hour at minute 7

  purge_jwt_denylist:
    class: PurgeJwtDenylistJob
    queue: background
    schedule: every hour at minute 17

  purge_refresh_tokens:
    class: PurgeRefreshTokensJob
    queue: background
    schedule: every day at 3:30am
