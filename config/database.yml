# PostgreSQL. Versions 9.3 and up are supported.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: turboapp_hds_development

test:
  <<: *default
  database: turboapp_hds_test

# Scalingo injects DATABASE_URL automatically.
# All Solid adapters (cable, queue, cache) share the same primary DB.
# database_tasks: false prevents Rails from running separate migration tasks
# on pseudo-databases that are just aliases of primary.
production:
  primary: &production_primary
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *production_primary
    database_tasks: false

  queue:
    <<: *production_primary
    database_tasks: false

  cable:
    <<: *production_primary
    database_tasks: false
